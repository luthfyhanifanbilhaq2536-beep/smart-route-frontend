<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tambah TPS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 font-sans p-4 flex flex-col h-screen justify-between">

    <div>
        <header class="bg-blue-600 text-white p-4 rounded-xl text-center font-bold shadow-md mb-6">
            🛠️ Panel Admin - Tambah TPS Baru
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Nama Lokasi / TPS</label>
                <input type="text" id="nama_tps" placeholder="Contoh: TPS Gedung B" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Latitude</label>
                <input type="number" step="any" id="lat" placeholder="Contoh: -7.3532" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Longitude</label>
                <input type="number" step="any" id="lon" placeholder="Contoh: 108.2245" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-blue-500">
            </div>
        </div>
    </div>

    <div class="space-y-3">
        <button id="btn-simpan" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition active:scale-95">
            Simpan ke Database Supabase
        </button>
        <a href="index.html" class="block w-full text-center bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-xl transition">
            Lihat Peta Driver 🚚
        </a>
    </div>

    <script>
        // MASUKKAN KREDENSIAL SUPABASE KAMU DI SINI
        const SUPABASE_URL = "https://smwothfhydhwptlqyemw.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtd290aGZoeWRod3B0bHF5ZW13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTA1NjMsImV4cCI6MjA5NjY2NjU2M30.wMmc0iFpLwAt2P5pGjl3EvCoHn79CjE6YqP0KfekPW4";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('btn-simpan').addEventListener('click', async() => {
            const nama = document.getElementById('nama_tps').value;
            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const btn = document.getElementById('btn-simpan');

            if (!nama || !lat || !lon) {
                alert("Semua kolom wajib diisi!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⏳ Menyimpan...";

            // Insert data ke tabel 'tps' di Supabase
            const {
                data,
                error
            } = await supabase
                .from('tps')
                .insert([{
                    nama_tps: nama,
                    lat: lat,
                    lon: lon
                }]);

            if (error) {
                alert("Gagal menyimpan data: " + error.message);
            } else {
                alert("🎉 Berhasil menyimpan TPS baru!");
                document.getElementById('nama_tps').value = '';
                document.getElementById('lat').value = '';
                document.getElementById('lon').value = '';
            }

            btn.disabled = false;
            btn.innerText = "Simpan ke Database Supabase";
        });
    </script>
</body>

</html>
