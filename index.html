<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Route UMB - Driver</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #map {
            height: 50vh;
            width: 100%;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans flex flex-col h-screen">

    <header class="bg-green-600 text-white p-4 text-center font-bold shadow-md flex justify-between items-center">
        <span>🚚 Peta Rute Driver UMB</span>
        <a href="admin.html" class="bg-green-700 hover:bg-green-800 text-xs px-3 py-1.5 rounded-lg border border-green-500">Menu Admin</a>
    </header>

    <div id="map" class="shadow-inner"></div>

    <div class="p-4 flex-1 flex flex-col justify-between">
        <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200">
            <h2 class="font-semibold text-gray-700 mb-1">Status Operasional</h2>
            <p class="text-sm text-gray-500">TPS dari Database: <span id="jumlah-tps" class="font-bold text-green-600">Loading...</span> Titik</p>
            <div class="mt-2 text-xs text-gray-400 overflow-y-auto max-h-24" id="urutan-jalan">
                Klik tombol di bawah untuk meminta rute terpendek ke AI Cloud.
            </div>
        </div>

        <button id="btn-hitung" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95">
            Hitung Rute Terpendek AI
        </button>
    </div>

    <script>
        // MASUKKAN KREDENSIAL SUPABASE YANG SAMA DI SINI
        const SUPABASE_URL = "LENGKAPI_DENGAN_PROJECT_URL_KAMU";
        const SUPABASE_ANON_KEY = "LENGKAPI_DENGAN_ANON_KEY_KAMU";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const pusatKampus = [-7.3512, 108.2235];
        const map = L.map('map').setView(pusatKampus, 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let dataTPS = [];

        // Fungsi mengambil data secara live dari database Supabase
        async function ambilDataDariSupabase() {
            // Titik awal wajib (Pos Armada Truk / Kampus UMB)
            dataTPS = [{
                id: "0",
                nama: "Pos Armada Truk",
                lat: -7.3512,
                lon: 108.2235
            }];

            const {
                data,
                error
            } = await supabaseClient.from('tps').select('*');

            if (error) {
                console.error("Gagal ambil data database:", error);
                document.getElementById('jumlah-tps').innerText = "Error";
                return;
            }

            // Gabungkan data dari database ke array rute
            data.forEach((item) => {
                dataTPS.push({
                    id: item.id.toString(),
                    nama: item.nama_tps,
                    lat: item.lat,
                    lon: item.lon
                });
            });

            document.getElementById('jumlah-tps').innerText = dataTPS.length;

            // Bersihkan marker lama lalu gambar marker baru
            map.eachLayer((layer) => {
                if (!!layer.toGeoJSON && !layer._url) map.removeLayer(layer);
            });
            dataTPS.forEach((tps, index) => {
                L.marker([tps.lat, tps.lon]).addTo(map).bindPopup(`<b>${tps.nama}</b>`);
            });
        }

        // Jalankan fungsi ambil data saat halaman dibuka
        ambilDataDariSupabase();

        document.getElementById('btn-hitung').addEventListener('click', async() => {
            if (dataTPS.length <= 1) {
                alert("Belum ada data TPS di database untuk dihitung!");
                return;
            }

            const btn = document.getElementById('btn-hitung');
            btn.innerText = "⏳ Menghitung via Cloud AI...";

            const URL_API_HUGGINGFACE = "https://luthfy25-smart-route-backend.hf.space/optimasi-rute";

            try {
                const response = await fetch(URL_API_HUGGINGFACE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dataTPS)
                });

                const hasil = await response.json();
                const ruteUrut = hasil.rute;

                const koordinatGaris = ruteUrut.map(t => [t.lat, t.lon]);
                const polyline = L.polyline(koordinatGaris, {
                    color: 'green',
                    weight: 5
                }).addTo(map);
                map.fitBounds(polyline.getBounds());

                let teksUrutan = "Urutan Rute Optimal Database: <br>";
                ruteUrut.forEach((t, i) => {
                    teksUrutan += `${i+1}. <b>${t.nama}</b><br>`;
                });
                document.getElementById('urutan-jalan').innerHTML = teksUrutan;

            } catch (error) {
                alert("Gagal terhubung ke AI Hugging Face.");
                console.error(error);
            } finally {
                btn.innerText = "Hitung Rute Terpendek AI";
            }
        });
    </script>
</body>

</html>
